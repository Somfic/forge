name: Publish

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  retag:
    name: retag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Retag to stable version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DRAFT_TAG="${{ github.event.release.tag_name }}"
          VERSION="${DRAFT_TAG%-draft}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # If the tag doesn't end in -draft, nothing to do
          if [ "$DRAFT_TAG" = "$VERSION" ]; then
            echo "Tag is already stable, skipping retag"
            exit 0
          fi

          # Create stable tag at the same commit
          COMMIT=$(git rev-list -n 1 "$DRAFT_TAG")
          git tag "$VERSION" "$COMMIT"
          git push origin "$VERSION"

          # Update the release to use the stable tag
          gh release edit "$DRAFT_TAG" --tag "$VERSION"

          # Delete the draft tag
          git push origin ":refs/tags/${DRAFT_TAG}"

  publish:
    name: publish
    needs: retag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.retag.outputs.version }}

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.retag.outputs.version }}
            type=raw,value=latest

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
